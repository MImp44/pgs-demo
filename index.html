<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PGS 2.0 — Digital Publicist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D2E52;--blue:#185FA5;--blue-m:#378ADD;--blue-l:#E6F1FB;
  --gold:#C5A028;--gold-l:#FFF8E0;
  --green:#3B6D11;--green-l:#EAF3DE;
  --amber:#854F0B;--amber-l:#FAEEDA;
  --red:#A32D2D;--red-l:#FCEBEB;
  --purple:#7C3AED;--purple-l:#F3E8FF;
  --dark:#1A1A18;--gray:#666;--muted:#999;
  --surface:#fff;--subtle:#F4F3EF;--border:#E5E3DC;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;background:var(--subtle);color:var(--dark)}
/* HEADER */
header{height:52px;background:var(--navy);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px}
.logo-badge{background:var(--gold);color:var(--navy);font-weight:800;font-size:12px;padding:3px 9px;border-radius:5px}
.logo-name{color:#fff;font-weight:600;font-size:14px}
.hdr-status{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.5);margin-left:10px}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.hdr-btn{background:rgba(255,255,255,0.12);border:none;color:rgba(255,255,255,0.8);font-size:11px;padding:5px 11px;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background 0.12s}
.hdr-btn:hover{background:rgba(255,255,255,0.22);color:#fff}
.hdr-badge{background:var(--gold);color:var(--navy);font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;min-width:16px;text-align:center}
/* LAYOUT */
.layout{display:flex;height:calc(100vh - 52px)}
/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-section{padding:12px 14px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted)}
.sb-item{padding:8px 14px;cursor:pointer;display:flex;flex-direction:column;gap:2px;border-bottom:0.5px solid var(--border);transition:background 0.1s}
.sb-item.active{background:var(--blue-l)}
.sb-item:hover:not(.active){background:var(--subtle)}
.sb-label{font-size:12px;font-weight:500;color:var(--dark)}
.sb-sub{font-size:10px;color:var(--muted)}
.sb-new{margin:12px;padding:8px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:auto}
.sb-new:hover{background:var(--blue)}
/* CHAT */
.chat-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px}
/* BUBBLES */
.msg-row{display:flex;gap:10px;align-items:flex-end;max-width:800px}
.msg-row.user{flex-direction:row-reverse;align-self:flex-end}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.av.bot{background:var(--navy);color:#fff;font-size:9px}
.av.user{background:var(--gold);color:var(--navy);font-size:11px}
.bubble{padding:11px 15px;border-radius:18px;max-width:560px;line-height:1.55;font-size:13px}
.bubble.bot{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--dark)}
.bubble.user{background:var(--navy);color:#fff;border-bottom-right-radius:4px}
/* TYPING */
.typing-row{display:flex;gap:10px;align-items:flex-end}
.typing-bub{background:var(--surface);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px;padding:13px 16px;display:flex;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bonce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bonce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
/* CHIPS */
.chip-row{display:flex;flex-wrap:wrap;gap:7px;padding:0 0 4px 40px;max-width:800px}
.chip{background:var(--surface);border:1px solid var(--navy);color:var(--navy);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap}
.chip:hover{background:var(--navy);color:#fff}
/* CARDS IN CHAT */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-width:420px;font-size:12px}
.card-hdr{background:var(--navy);color:#fff;padding:11px 14px;display:flex;align-items:center;gap:8px}
.card-hdr-ico{font-size:15px}
.card-hdr-title{font-weight:600;font-size:12px}
.card-hdr-sub{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px}
.card-draft{background:var(--amber-l);color:var(--amber);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:auto;white-space:nowrap}
.card-row{display:flex;padding:7px 14px;border-bottom:1px solid var(--border)}
.card-row:last-of-type{border:none}
.card-lbl{font-size:10px;color:var(--muted);width:82px;flex-shrink:0;padding-top:1px}
.card-val{font-size:11px;font-weight:500;color:var(--dark)}
.card-actions{padding:10px 14px;display:flex;gap:7px;border-top:1px solid var(--border);background:var(--subtle)}
.card-btn-p{background:var(--navy);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer}
.card-btn-p:hover{background:var(--blue)}
.card-btn-s{background:var(--surface);color:var(--navy);border:1px solid var(--border);border-radius:6px;padding:6px 11px;font-size:11px;cursor:pointer}
/* MINI TABLE IN CHAT */
.mini-tbl{width:100%;border-collapse:collapse;font-size:11px;max-width:520px}
.mini-tbl th{background:var(--navy);color:#fff;padding:6px 8px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.3px}
.mini-tbl td{padding:6px 8px;border-bottom:1px solid var(--border)}
.mini-tbl tr:last-child td{border:none}
.mini-tbl tr:nth-child(even) td{background:var(--subtle)}
.mini-tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-width:600px}
/* STATUS BADGES */
.b{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.bv{background:var(--blue-l);color:var(--blue)}
.bs{background:var(--amber-l);color:var(--amber)}
.bg{background:var(--green-l);color:var(--green)}
.br{background:var(--red-l);color:var(--red)}
.bgy{background:#F1EFE8;color:#5F5E5A}
/* INPUT */
.input-area{border-top:1px solid var(--border);padding:14px 20px;background:var(--surface);display:flex;gap:9px;align-items:center}
#chat-input{flex:1;border:1px solid var(--border);border-radius:22px;padding:9px 16px;font-size:13px;font-family:inherit;outline:none;color:var(--dark);background:var(--subtle);resize:none;max-height:110px;line-height:1.4}
#chat-input:focus{border-color:var(--blue-m);background:#fff}
#chat-input:disabled{opacity:.5;cursor:not-allowed}
#send-btn{width:38px;height:38px;border-radius:50%;background:var(--navy);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#send-btn:hover{background:var(--blue)}
#send-btn:disabled{opacity:.4;cursor:not-allowed}
#send-btn svg{fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.input-hint{font-size:10px;color:var(--muted);text-align:center;margin-top:5px}
/* RECORDS PANEL */
.records-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:none}
.records-overlay.open{display:block}
.records-panel{position:fixed;top:0;right:0;bottom:0;width:560px;background:var(--surface);z-index:301;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.records-panel.open{transform:translateX(0)}
.rp-header{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.rp-title{font-size:14px;font-weight:600;flex:1}
.rp-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;line-height:1}
.rp-close:hover{color:#fff}
.rp-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:#fff}
.rp-tab{padding:10px 16px;font-size:12px;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.rp-tab.on{color:var(--navy);border-bottom-color:var(--gold);font-weight:600}
.rp-body{flex:1;overflow-y:auto;padding:16px}
.rp-section{margin-bottom:18px}
.rp-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px}
.rec-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px}
.rec-icon{width:34px;height:34px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;color:#fff}
.rec-title{font-size:12px;font-weight:600;color:var(--dark)}
.rec-meta{font-size:11px;color:var(--gray);margin-top:2px}
.rec-right{margin-left:auto;text-align:right}
.rec-status{font-size:10px;font-weight:600}
.rec-stat-val{font-size:13px;font-weight:700;color:var(--navy);margin-top:2px}
.new-badge{background:var(--gold-l);color:var(--gold);font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;border:1px solid var(--gold)}
.press-tbl{width:100%;border-collapse:collapse;font-size:11px}
.press-tbl th{background:var(--navy);color:#fff;padding:6px 8px;text-align:left;font-size:10px;font-weight:600}
.press-tbl td{padding:6px 8px;border-bottom:1px solid var(--border)}
.press-tbl tr:nth-child(even) td{background:var(--subtle)}
.rp-search{border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;width:100%;margin-bottom:10px;outline:none;font-family:inherit}
.rp-search:focus{border-color:var(--blue-m)}
.rp-empty{text-align:center;padding:32px;color:var(--muted);font-size:12px}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-mini{background:var(--subtle);border-radius:8px;padding:11px 13px;text-align:center}
.stat-mini-val{font-size:20px;font-weight:700;color:var(--navy)}
.stat-mini-lbl{font-size:10px;color:var(--muted);margin-top:2px}
/* SCROLLBAR */
.messages::-webkit-scrollbar,.rp-body::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb,.rp-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">PGS</span>
    <span class="logo-name">2.0</span>
  </div>
  <div class="hdr-status">
    <div class="hdr-dot"></div>
    Digital Publicist &nbsp;·&nbsp; Online
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" onclick="openRecords('overview')" id="records-btn">
      📁 Records <span class="hdr-badge" id="records-count">0</span>
    </button>
    <button class="hdr-btn" onclick="newConv()">+ New conversation</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sb-section">Recent</div>
    <div class="sb-item active"><div class="sb-label">New conversation</div><div class="sb-sub">Just now</div></div>
    <div class="sb-item" onclick="openRecords('screening')"><div class="sb-label">TS5 Screenings</div><div class="sb-sub" id="sb-scr-count">3 active</div></div>
    <div class="sb-item" onclick="openRecords('junket')"><div class="sb-label">TS5 Junket</div><div class="sb-sub">Jun 6 · Pixar</div></div>
    <div class="sb-item" onclick="openRecords('press')"><div class="sb-label">TS5 Press List</div><div class="sb-sub" id="sb-press-count">25 credentialed</div></div>
    <button class="sb-new" onclick="newConv()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New conversation
    </button>
  </div>

  <div class="chat-wrap">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="chat-input" placeholder="Type a message…" rows="1" onkeydown="handleKey(event)" oninput="autosize(this)"></textarea>
      <button id="send-btn" onclick="sendMsg()" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="input-hint">PGS 2.0 · Walt Disney Studios Motion Pictures · Confidential</div>
  </div>
</div>

<!-- RECORDS PANEL -->
<div class="records-overlay" id="rp-overlay" onclick="closeRecords()"></div>
<div class="records-panel" id="records-panel">
  <div class="rp-header">
    <span style="font-size:16px">📁</span>
    <span class="rp-title">PGS Records</span>
    <span style="font-size:11px;color:rgba(255,255,255,.5)" id="rp-subtitle">Toy Story 5</span>
    <button class="rp-close" onclick="closeRecords()">&#x2715;</button>
  </div>
  <div class="rp-tabs">
    <div class="rp-tab on" onclick="rpTab('overview',this)">Overview</div>
    <div class="rp-tab" onclick="rpTab('screening',this)">Screenings</div>
    <div class="rp-tab" onclick="rpTab('junket',this)">Junkets</div>
    <div class="rp-tab" onclick="rpTab('press',this)">Press</div>
  </div>
  <div class="rp-body" id="rp-body"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// DATA STORE  (localStorage-backed)
// ══════════════════════════════════════════════════════════
const TS5_SCREENINGS = [
  { id:'scr1', title:'Toy Story 5', type:'Word of Mouth (WOM)', market:'Los Angeles', theater:'AMC Century City 15', datetime:'Jun 10, 2025 · 7:00 PM', format:'Standard', seats:'250', security:'Yes — full security', status:'confirmed', rsvp:238, submittedAt:'2025-05-28', isPreload:true },
  { id:'scr2', title:'Toy Story 5', type:'Press', market:'Los Angeles', theater:'ArcLight Hollywood', datetime:'Jun 12, 2025 · 6:30 PM', format:'Dolby Cinema', seats:'120', security:'Minimal / check only', status:'confirmed', rsvp:98, submittedAt:'2025-05-30', isPreload:true },
  { id:'scr3', title:'Toy Story 5', type:'IMAX Special', market:'Los Angeles', theater:'Universal CityWalk IMAX', datetime:'Jun 14, 2025 · 8:00 PM', format:'IMAX', seats:'400', security:'Yes — full security', status:'confirmed', rsvp:312, submittedAt:'2025-06-01', isPreload:true },
];
const TS5_JUNKETS = [
  { id:'jnk1', title:'Toy Story 5', dates:'June 3–7, 2025', location:'Fairmont San Francisco · Pixar Animation Studios', talent:'Tom Hanks & Tim Allen, Joan Cusack & Tony Hale, Andrew Stanton & Kenna Harris & Lindsey Collins', press_status:'Press list confirmed — 25 outlets', status:'active', submittedAt:'2025-05-15', isPreload:true },
];
const TS5_PRESS = [
  { journalist:'Lawrence Sharma', outlet:'AMCTheatres.com', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Jace Diehl', outlet:'Animated With Jace Diehl', territory:'USA', format:'Specialty', talent:'Andrew Stanton solo', status:'confirmed' },
  { journalist:'TBD', outlet:'APTV', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Jamie Broadnax', outlet:'Black Girl Nerds', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Wilson Morales', outlet:'BlackFilmAndTV.com', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Trey Mangum', outlet:'Blavity TV', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Carolina Reynoso', outlet:'Buzzfeed Pero Like', territory:'USA', format:'Specialty', talent:'All talent', status:'confirmed' },
  { journalist:'Law Sharma', outlet:'ComicBook.com', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Denise Reyes', outlet:'Despierta America (Univision)', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Adam Graham', outlet:'Detroit News', territory:'USA', format:'Virtual', talent:'Tim Allen only', status:'confirmed' },
  { journalist:'Tanya Charry', outlet:'El Gordo Y La Flaca', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Mario Perea', outlet:'Hoy Dia', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'TBD', outlet:'IMAX.com', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Rafael Cores', outlet:'ImpreMedia', territory:'USA', format:'In-person', talent:'All + Casarosa', status:'confirmed' },
  { journalist:'TBD', outlet:'KTLA-TV (CW)', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Mark S. Allen', outlet:'KXTV-TV (ABC)', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'TBC', outlet:'Letterboxd', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Miranda Montenegro', outlet:'Mitú', territory:'USA', format:'Specialty', talent:'All talent', status:'confirmed' },
  { journalist:'Joe Deckelmeier', outlet:'MovieWeb', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Photographer TBD', outlet:'New York Times National', territory:'USA', format:'Photoshoot', talent:'Joan Cusack only', status:'confirmed' },
  { journalist:'Danielle Broadway', outlet:'Reuters', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Brian Truitt', outlet:'USA Today', territory:'USA', format:'Virtual', talent:'Hanks & Allen', status:'confirmed' },
  { journalist:'Jake Hamilton', outlet:'WFLD-TV (Fox)', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
  { journalist:'Patrick Stoner', outlet:'WHYY-TV (PBS)', territory:'USA', format:'Virtual', talent:'Tom Hanks only', status:'confirmed' },
  { journalist:'KT (Kurra Turner)', outlet:'Disney Internal', territory:'USA', format:'In-person', talent:'All talent', status:'confirmed' },
];

const DB = {
  screenings: [],
  junkets: [],
  press: [],
  submissions: [],

  init() {
    const inited = localStorage.getItem('pgs_v3_init');
    if (!inited) {
      this.screenings = JSON.parse(JSON.stringify(TS5_SCREENINGS));
      this.junkets    = JSON.parse(JSON.stringify(TS5_JUNKETS));
      this.press      = JSON.parse(JSON.stringify(TS5_PRESS));
      this.submissions = [];
      this.save();
      localStorage.setItem('pgs_v3_init','1');
    } else {
      this.screenings  = JSON.parse(localStorage.getItem('pgs_screenings')  || '[]');
      this.junkets     = JSON.parse(localStorage.getItem('pgs_junkets')     || '[]');
      this.press       = JSON.parse(localStorage.getItem('pgs_press')       || '[]');
      this.submissions = JSON.parse(localStorage.getItem('pgs_submissions') || '[]');
    }
  },

  save() {
    localStorage.setItem('pgs_screenings',  JSON.stringify(this.screenings));
    localStorage.setItem('pgs_junkets',     JSON.stringify(this.junkets));
    localStorage.setItem('pgs_press',       JSON.stringify(this.press));
    localStorage.setItem('pgs_submissions', JSON.stringify(this.submissions));
  },

  addScreening(ctx) {
    const r = { id:'scr'+Date.now(), title:ctx.title, type:ctx.type, market:ctx.market,
      theater:ctx.theater, datetime:ctx.datetime, format:ctx.format, seats:ctx.seats,
      security:ctx.security, status:'pending', rsvp:0,
      submittedAt:new Date().toLocaleDateString(), isPreload:false };
    this.screenings.push(r);
    this.logActivity('Screening request submitted: '+ctx.title+' · '+ctx.type+' · '+ctx.theater);
    this.save(); updateCounts();
    return r;
  },

  addJunket(ctx) {
    const r = { id:'jnk'+Date.now(), title:ctx.title, dates:ctx.dates, location:ctx.location,
      talent:ctx.talent, press_status:ctx.press_status, status:'planning',
      submittedAt:new Date().toLocaleDateString(), isPreload:false };
    this.junkets.push(r);
    this.logActivity('Junket created: '+ctx.title+' · '+ctx.dates);
    this.save(); updateCounts();
    return r;
  },

  addPressGuest(ctx) {
    const r = { journalist:ctx.journalist, outlet:ctx.outlet, territory:'USA',
      format:ctx.format, talent:ctx.talent_req, status:'pending',
      submittedAt:new Date().toLocaleDateString(), isPreload:false };
    this.press.push(r);
    this.logActivity('Press guest added: '+ctx.journalist+' · '+ctx.outlet);
    this.save(); updateCounts();
    return r;
  },

  logActivity(msg) {
    this.submissions.unshift({ msg, at: new Date().toLocaleTimeString() });
    if (this.submissions.length > 50) this.submissions.pop();
  }
};

// ══════════════════════════════════════════════════════════
// COUNTS
// ══════════════════════════════════════════════════════════
function updateCounts() {
  const total = DB.screenings.length + DB.junkets.length + DB.press.length;
  document.getElementById('records-count').textContent = total;
  document.getElementById('sb-scr-count').textContent  = DB.screenings.length + ' active';
  document.getElementById('sb-press-count').textContent = DB.press.length + ' credentialed';
}

// ══════════════════════════════════════════════════════════
// RECORDS PANEL
// ══════════════════════════════════════════════════════════
let rpCurrentTab = 'overview';

function openRecords(tab) {
  document.getElementById('rp-overlay').classList.add('open');
  document.getElementById('records-panel').classList.add('open');
  rpTab(tab, document.querySelectorAll('.rp-tab')[['overview','screening','junket','press'].indexOf(tab)] || document.querySelector('.rp-tab'));
}
function closeRecords() {
  document.getElementById('rp-overlay').classList.remove('open');
  document.getElementById('records-panel').classList.remove('open');
}
function rpTab(tab, el) {
  rpCurrentTab = tab;
  document.querySelectorAll('.rp-tab').forEach(t=>t.classList.remove('on'));
  if(el)el.classList.add('on');
  renderRp(tab);
}

function renderRp(tab) {
  const body = document.getElementById('rp-body');
  if (tab === 'overview') body.innerHTML = renderOverview();
  else if (tab === 'screening') body.innerHTML = renderScreenings();
  else if (tab === 'junket') body.innerHTML = renderJunkets();
  else if (tab === 'press') body.innerHTML = renderPressPanel();
}

// ══════════════════════════════════════════════════════════
// CONVERSATION STATE MACHINE
// ══════════════════════════════════════════════════════════
let state = 'idle';
let ctx = {};
let flowIndex = 0;

const FLOWS = {
  screening: [
    { key:'title',    ask:()=>"Which film are we scheduling for?",    chips:["Toy Story 5","Incredibles 4","Inside Out 3","Other"] },
    { key:'type',     ask:()=>`Got it — <strong>${ctx.title}</strong>. What type of screening?`, chips:["Press","Word of Mouth (WOM)","Festival","Special Event","IMAX Premiere"] },
    { key:'market',   ask:()=>"Which market?", chips:["Los Angeles","New York","Atlanta","Chicago","Other"] },
    { key:'theater',  ask:()=>`${ctx.market} — great. Preferred theater, or should I suggest options?`, chips:()=>theaterOpts() },
    { key:'datetime', ask:()=>`<strong>${ctx.theater}</strong>. What date and time are you targeting?`, chips:[] },
    { key:'format',   ask:()=>"What format?", chips:["Standard","IMAX","Dolby Cinema","4DX","Premium Large Format"] },
    { key:'seats',    ask:()=>`<strong>${ctx.format}</strong>. How many seats?`, chips:["100","150","250","400","Full house"] },
    { key:'security', ask:()=>"Will you need on-site security?", chips:["Yes — full security","Minimal / check only","No","TBD"] },
    { key:'confirm',  isConfirm:true }
  ],
  junket:[
    { key:'title',        ask:()=>"Which film?", chips:["Toy Story 5","Incredibles 4","Inside Out 3","Other"] },
    { key:'dates',        ask:()=>`<strong>${ctx.title}</strong> — what are the dates?`, chips:[] },
    { key:'location',     ask:()=>"Where will it be held?", chips:["Fairmont San Francisco","The Beverly Hills Hotel","The Ritz-Carlton LA","Other"] },
    { key:'talent',       ask:()=>"Which talent will be participating?", chips:[] },
    { key:'press_status', ask:()=>"Is your press list ready?", chips:["I have a list to import","Starting fresh","Coming from PR team"] },
    { key:'confirm', isConfirm:true }
  ],
  press:[
    { key:'event',      ask:()=>"Which event are we adding press to?", chips:["TS5 Junket — Jun 6","Incredibles 4 Long Lead","Other event"] },
    { key:'journalist', ask:()=>`Adding press to <strong>${ctx.event}</strong>. Journalist's name?`, chips:[] },
    { key:'outlet',     ask:()=>`Which outlet does <strong>${ctx.journalist}</strong> represent?`, chips:[] },
    { key:'talent_req', ask:()=>"Which talent are they requesting?", chips:["Tom Hanks & Tim Allen","Joan Cusack & Tony Hale","Andrew Stanton & Kenna Harris","All talent"] },
    { key:'format',     ask:()=>"Any special requests?", chips:["In-person only","Virtual OK","Specialty concept","No special requests"] },
    { key:'confirm', isConfirm:true }
  ],
  report:[
    { key:'event', ask:()=>"Which event?", chips:["TS5 Junket — Jun 6","Incredibles 4 Long Lead","All active events"] },
    { key:'type',  ask:()=>"Which report?", chips:["Rooming List","Transfer Manifest","Travel Report","Press Attendance","Interview Schedule","1:1 Requests by Talent"] },
    { key:'confirm', isConfirm:true }
  ],
};

function theaterOpts() {
  const m={'Los Angeles':["AMC Century City 15","ArcLight Hollywood","El Capitan Theatre","DGA Theater","Other"],'New York':["AMC Lincoln Square 13","SVA Theatre","IFC Center","Other"],'Atlanta':["AMC Phipps Plaza 14","Regal Buckhead","Other"],'Chicago':["AMC River East 21","Music Box Theatre","Other"]};
  return m[ctx.market] || ["Other"];
}

function detectIntent(q) {
  const lq = q.toLowerCase();
  if(/show.*(screen|wom)|list screen|what screen|how many screen|my screen/.test(lq)) return '_show_screenings';
  if(/show.*(junket|press day)|list junket|what junket|my junket/.test(lq)) return '_show_junkets';
  if(/show.*(press|journalist)|list press|who.*press|press list|how many press|my press/.test(lq)) return '_show_press';
  if(/show record|open record|view record|what.*system|show.*data|overview/.test(lq)) return '_show_overview';
  if(/screen|wom|word of mouth|theater|theatre/.test(lq)) return 'screening';
  if(/junket|press day|press event/.test(lq)) return 'junket';
  if(/press|journalist|credential/.test(lq)) return 'press';
  if(/report|rooming|download|generate/.test(lq)) return 'report';
  if(/international|intl|territory|global/.test(lq)) return 'intl_placeholder';
  return null;
}

function respond(input) {
  const q = input.toLowerCase().trim();
  if(/^(start over|restart|reset|new|home)$/.test(q)) { startOver(); return; }
  if(/^help$/.test(q) || q === '?') { showWelcome(); return; }

  if (state === 'idle' || state === 'done') {
    const intent = detectIntent(input);
    if (!intent) {
      botMessage("I can help with screenings, junkets, press guests, reports, and more. What would you like to do?",
        ["Schedule a screening","Plan a junket","Add press guests","Show my screenings","Show press list"]);
      return;
    }
    if (intent.startsWith('_show_')) { handleDataQuery(intent); return; }
    if (intent === 'intl_placeholder') { botMessage("International coordination is available — which title and territory would you like to work on?",["Toy Story 5","Incredibles 4"]); return; }
    startFlow(intent);
    return;
  }
  advanceFlow(input);
}

// ── DATA QUERIES ──────────────────────────────────────────
function handleDataQuery(intent) {
  if (intent === '_show_screenings') {
    const scrs = DB.screenings;
    const rows = scrs.map(s=>`<tr>
      <td style="font-weight:500">${s.title}</td>
      <td>${s.type}</td>
      <td>${s.theater}</td>
      <td>${s.datetime}</td>
      <td><span class="b ${s.status==='confirmed'?'bg':'bs'}">${s.status}</span></td>
    </tr>`).join('');
    const tbl = `<div class="mini-tbl-wrap"><table class="mini-tbl">
      <thead><tr><th>Film</th><th>Type</th><th>Theater</th><th>Date/Time</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
    botMessage(`You have <strong>${scrs.length} screening${scrs.length!==1?'s':''}</strong> in the system:`);
    addCard(tbl);
    addChips(["Schedule another","View in Records"]);
  } else if (intent === '_show_junkets') {
    const j = DB.junkets[0];
    botMessage(`<strong>${DB.junkets.length} active junket</strong> in PGS:`);
    const tbl = `<div class="mini-tbl-wrap"><table class="mini-tbl">
      <thead><tr><th>Film</th><th>Dates</th><th>Location</th><th>Status</th></tr></thead>
      <tbody>${DB.junkets.map(j=>`<tr><td style="font-weight:500">${j.title}</td><td>${j.dates}</td><td>${j.location.split('·')[0].trim()}</td><td><span class="b bg">${j.status}</span></td></tr>`).join('')}</tbody>
    </table></div>`;
    addCard(tbl);
    addChips(["Plan another junket","View in Records"]);
  } else if (intent === '_show_press') {
    const p = DB.press;
    const virtual  = p.filter(g=>g.format==='Virtual').length;
    const specialty= p.filter(g=>g.format==='Specialty').length;
    const newOnes  = p.filter(g=>g.isPreload===false).length;
    botMessage(`<strong>${p.length} press guests</strong> credentialed for TS5 — ${virtual} virtual, ${specialty} specialty format${newOnes>0?`, ${newOnes} added this session`:''}.`);
    const rows = p.slice(0,8).map(g=>`<tr><td style="font-weight:500">${g.journalist}</td><td>${g.outlet}</td><td>${g.format}</td></tr>`).join('');
    const tbl = `<div class="mini-tbl-wrap"><table class="mini-tbl">
      <thead><tr><th>Journalist</th><th>Outlet</th><th>Format</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div style="font-size:11px;color:var(--muted);padding:6px 8px">Showing 8 of ${p.length} — open Records panel to see all</div>`;
    addCard(tbl);
    addChips(["Add press guest","View full list in Records"]);
  } else if (intent === '_show_overview') {
    openRecords('overview');
    botMessage("Here's your Records panel — all TS5 data in one view.", ["Schedule a screening","Add press guest"]);
  }
}

function addCard(html) {
  removeChips();
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row';
  const spacer = document.createElement('div'); spacer.style.width='40px';
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  row.appendChild(spacer); row.appendChild(wrap);
  msgs.appendChild(row);
  scrollBot();
}
function addChips(chips) {
  const cr = document.createElement('div'); cr.className='chip-row';
  chips.forEach(c => {
    const b = document.createElement('button'); b.className='chip'; b.textContent=c;
    b.onclick = () => { if(c==='View in Records'||c==='View full list in Records') openRecords(c.includes('full')?'press':'overview'); else chipSend(c); };
    cr.appendChild(b);
  });
  document.getElementById('messages').appendChild(cr);
  scrollBot();
}

// ── FLOW ENGINE ───────────────────────────────────────────
function getStep() {
  const flow = state.split('.')[0];
  return (FLOWS[flow]||[])[flowIndex] || null;
}

function startFlow(intent) {
  state = intent+'.0'; flowIndex = 0; ctx = {};
  const step = getStep();
  if(step){ const chips = typeof step.chips==='function'?step.chips():step.chips; botMessage(step.ask(), chips); }
}

function advanceFlow(input) {
  const flow = state.split('.')[0];
  const steps = FLOWS[flow]; if(!steps) return;
  const step = steps[flowIndex]; if(!step) return;
  ctx[step.key] = input;
  flowIndex++;
  const next = steps[flowIndex];
  if(!next || next.isConfirm) { showConfirmation(); return; }
  const ask = next.ask();
  const chips = typeof next.chips==='function'?next.chips():next.chips;
  setTimeout(() => botMessage(ask, chips||[]), 550);
}

function showConfirmation() {
  const flow = state.split('.')[0];
  const msgs = { screening:"Here's the screening request — everything look right?", junket:"Here's the junket setup — ready to create?", press:"Here's the guest record — ready to save?", report:"Ready to generate:" };
  setTimeout(() => {
    botMessage(msgs[flow]||"Here's what I've built:");
    const card = makeCard(flow);
    if(card) {
      const msgs_el = document.getElementById('messages');
      const row = document.createElement('div'); row.className='msg-row';
      const sp = document.createElement('div'); sp.style.width='40px';
      row.appendChild(sp); row.appendChild(card);
      msgs_el.appendChild(row); scrollBot();
    }
    state = 'done';
  }, 800);
}

function cardRow(l,v){return v?`<div class="card-row"><div class="card-lbl">${l}</div><div class="card-val">${v}</div></div>`:'';}

function makeCard(flow) {
  const el = document.createElement('div'); el.className='card';
  if(flow==='screening'){
    el.innerHTML=`<div class="card-hdr"><span class="card-hdr-ico">🎬</span><div><div class="card-hdr-title">Screening Request</div><div class="card-hdr-sub">${ctx.title}</div></div><span class="card-draft">DRAFT</span></div>
      <div class="card-body">${cardRow('Type',ctx.type)}${cardRow('Market',ctx.market)}${cardRow('Theater',ctx.theater)}${cardRow('Date/time',ctx.datetime)}${cardRow('Format',ctx.format)}${cardRow('Seats',ctx.seats)}${cardRow('Security',ctx.security)}</div>
      <div class="card-actions"><button class="card-btn-p" onclick="submitCard(this,'screening','Screening request submitted and saved to PGS Records.')">Submit for approval</button><button class="card-btn-s" onclick="startOver()">Start over</button></div>`;
  } else if(flow==='junket'){
    el.innerHTML=`<div class="card-hdr"><span class="card-hdr-ico">🎤</span><div><div class="card-hdr-title">Junket Setup</div><div class="card-hdr-sub">${ctx.title}</div></div><span class="card-draft">DRAFT</span></div>
      <div class="card-body">${cardRow('Film',ctx.title)}${cardRow('Dates',ctx.dates)}${cardRow('Location',ctx.location)}${cardRow('Talent',ctx.talent)}${cardRow('Press list',ctx.press_status)}</div>
      <div class="card-actions"><button class="card-btn-p" onclick="submitCard(this,'junket','Junket created and saved to PGS Records.')">Create junket</button><button class="card-btn-s" onclick="startOver()">Start over</button></div>`;
  } else if(flow==='press'){
    el.innerHTML=`<div class="card-hdr"><span class="card-hdr-ico">📋</span><div><div class="card-hdr-title">Press Guest</div><div class="card-hdr-sub">${ctx.event}</div></div><span class="card-draft">DRAFT</span></div>
      <div class="card-body">${cardRow('Journalist',ctx.journalist)}${cardRow('Outlet',ctx.outlet)}${cardRow('Talent req.',ctx.talent_req)}${cardRow('Format',ctx.format)}</div>
      <div class="card-actions"><button class="card-btn-p" onclick="submitCard(this,'press','Guest record saved to PGS Press List.')">Save guest</button><button class="card-btn-s" onclick="addAnother()">Add another</button><button class="card-btn-s" onclick="startOver()">Done</button></div>`;
  } else if(flow==='report'){
    el.innerHTML=`<div class="card-hdr"><span class="card-hdr-ico">📄</span><div><div class="card-hdr-title">${ctx.type||'Report'}</div><div class="card-hdr-sub">${ctx.event}</div></div></div>
      <div style="padding:13px 14px;font-size:11px;color:var(--muted)">Ready to generate — formatted and ready to send, no reformatting required.</div>
      <div class="card-actions"><button class="card-btn-p" onclick="submitCard(this,'report','Report generated.')">Download CSV</button><button class="card-btn-s" onclick="startOver()">Generate another</button></div>`;
  }
  return el;
}

function submitCard(btn, flow, msg) {
  // Save to DB
  if(flow==='screening') DB.addScreening(ctx);
  if(flow==='junket') DB.addJunket(ctx);
  if(flow==='press') DB.addPressGuest(ctx);
  btn.textContent = '✓ Saved to PGS';
  btn.style.background = 'var(--green)';
  btn.disabled = true;
  setTimeout(() => {
    botMessage(msg + ' <button onclick="openRecords(\''+flow+'\')" style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;text-decoration:underline">View in Records →</button>',
      ["Schedule another","Show my screenings","Start over"]);
    state='idle';
  }, 500);
}

function addAnother() {
  state='press.0'; flowIndex=0; ctx={event:ctx.event};
  botMessage(`Adding another guest to <strong>${ctx.event}</strong>. Name?`, []);
  flowIndex=1;
}
function startOver() { state='idle'; flowIndex=0; ctx={}; showWelcome(); }
function newConv() { document.getElementById('messages').innerHTML=''; startOver(); }

// ── RENDER ────────────────────────────────────────────────
let typingId = null;

function showTyping() {
  removeChips();
  const msgs=document.getElementById('messages');
  const row=document.createElement('div'); row.className='typing-row'; row.id='typing';
  row.innerHTML=`<div class="av bot">PGS</div><div class="typing-bub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(row); scrollBot();
}
function hideTyping() { const el=document.getElementById('typing'); if(el)el.remove(); }
function removeChips() { document.querySelectorAll('.chip-row').forEach(e=>e.remove()); }

function botMessage(html, chips) {
  if(html===null) return;
  hideTyping();
  const msgs=document.getElementById('messages');
  const row=document.createElement('div'); row.className='msg-row';
  row.innerHTML=`<div class="av bot">PGS</div><div class="bubble bot">${html}</div>`;
  msgs.appendChild(row);
  if(chips&&chips.length) {
    const cr=document.createElement('div'); cr.className='chip-row';
    chips.forEach(c=>{ const b=document.createElement('button'); b.className='chip'; b.textContent=c; b.onclick=()=>chipSend(c); cr.appendChild(b); });
    msgs.appendChild(cr);
  }
  scrollBot();
}

function userMessage(text) {
  removeChips();
  const msgs=document.getElementById('messages');
  const row=document.createElement('div'); row.className='msg-row user';
  row.innerHTML=`<div class="av user">MI</div><div class="bubble user">${text}</div>`;
  msgs.appendChild(row); scrollBot();
}

function chipSend(text) {
  userMessage(text);
  setEnabled(false); showTyping();
  setTimeout(()=>{ hideTyping(); setEnabled(true); respond(text); document.getElementById('chat-input').focus(); }, 480);
}

function sendMsg() {
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim(); if(!text) return;
  userMessage(text); inp.value=''; inp.style.height='';
  setEnabled(false); showTyping();
  setTimeout(()=>{ hideTyping(); setEnabled(true); respond(text); inp.focus(); }, 560);
}

function setEnabled(on) {
  document.getElementById('chat-input').disabled=!on;
  document.getElementById('send-btn').disabled=!on;
}

function scrollBot() { const m=document.getElementById('messages'); setTimeout(()=>m.scrollTop=m.scrollHeight,50); }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }
function autosize(el) { el.style.height=''; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

function showWelcome() {
  const scrCount  = DB.screenings.length;
  const jnkActive = DB.junkets.filter(j=>j.status==='active').length;
  const pressCount= DB.press.length;
  setTimeout(() => botMessage(
    `Welcome to <strong>PGS 2.0</strong>. Here's where things stand for <strong>Toy Story 5</strong>:<br><br>
    🎬 <strong>${scrCount} screenings</strong> — all confirmed<br>
    🎤 <strong>${jnkActive} active junket</strong> — June 3–7, Pixar<br>
